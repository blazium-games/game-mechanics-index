name: Publish release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.8'
      - name: Export API
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go run ./cmd/export -version "$VERSION"
          cd data/dist/api && zip -r "../../../mechanics-index-api-${VERSION}.zip" v1
          cd ../formats && zip -r "../../../mechanics-index-formats-${VERSION}.zip" v1
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            mechanics-index-api-*.zip
            mechanics-index-formats-*.zip
